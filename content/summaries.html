<script id="raw-data" type="application/json">{"hadith": {"name": "التلخيصات القمرية على البيقونية", "items": [{"t": "مقدمة: علم آلة لا يُقصد لذاته", "b": ["علم مصطلح الحديث لا يُقصد لذاته، وإنما هو علم آلة يخدم علومًا أخرى مثل الفقه والتفسير، وهو من العلوم القادمة لخدمة الفقه، مثله في ذلك مثل القواعد الفقهية والفروق الفقهية وعلم مقاصد الشريعة، وكذلك علم النحو الذي يفيد في فهم النصوص وتفسيرها.", "والهدف من دراسة المصطلح أن نستطيع فهم المصطلحات التي نقرؤها في كتب الحديث، مثل: حديث صحيح، حديث حسن، حديث غريب، حديث عزيز، حديث مشهور، حديث متواتر، حديث آحاد، فنفهم معنى كل مصطلح منها عند إطلاقه، ولا نمر عليها دون فهم."]}, {"t": "السند والمتن", "b": ["الحديث النبوي يتكون من جزأين: السند والمتن. فمثلًا: حديث في البخاري عن مالك عن نافع عن ابن عمر عن النبي صلى الله عليه وسلم، فسلسلة الرجال من البخاري إلى النبي صلى الله عليه وسلم تسمى السند، وهو مجموعة الرجال الموصلة إلى المتن.", "أما الكلام نفسه الذي رُوي، مثل قول النبي صلى الله عليه وسلم: «إنما الأعمال بالنيات»، فهو المتن، وتعريفه: ما انتهى إليه السند. والصحابي الذي روى عن النبي صلى الله عليه وسلم مباشرة يسمى الراوي الأعلى.", "وعلم مصطلح الحديث يشتغل أساسًا على السند؛ لأن الهدف هو التأكد هل الكلام المنسوب إلى النبي صلى الله عليه وسلم صحيح عنه أم لا، لأن هذا الكلام سيُبنى عليه أحكام في العقيدة والفقه والمعاملات وفضائل الأعمال."]}, {"t": "تعريف الحديث الصحيح وشروطه الستة", "b": ["تعريف الحديث الصحيح -وهو من أهم ما يُحفظ في هذا العلم-: هو ما اتصل سنده، برواية العدل الضابط، عن مثله، إلى منتهاه، من غير شذوذ ولا علة قادحة.", "من هذا التعريف تُستخرج ستة شروط لصحة الحديث، وهي: اتصال السند، والعدالة، والضبط، وأن تتحقق العدالة والضبط في كل رجال السند لا في بعضهم فقط، والخلو من الشذوذ، والخلو من العلة القادحة."], "viz": [{"after": 0, "kind": "tip", "text": "هذا التعريف من أكثر أسئلة الامتحان تكرارًا؛ يُطلب غالبًا مع ذكر الشروط وشرح كل شرط، فاحفظه حرفيًا كما هو ثم افهمه."}, {"after": 1, "kind": "table", "title": "شروط الحديث الصحيح الستة", "headers": ["الشرط", "المعنى باختصار"], "rows": [["اتصال السند", "أن يسمع كل راوٍ ممن روى عنه مباشرة، دون انقطاع"], ["العدالة", "أن يكون الرواة أهل دين وأمانة، لا يكذبون ولا يفسقون"], ["الضبط", "أن يكون الراوي قوي الحفظ، صدرًا أو كتابة"], ["عن مثله إلى منتهاه", "أن تتوفر العدالة والضبط في كل رجال السند لا في بعضهم"], ["الخلو من الشذوذ", "ألا يخالف الثقة من هو أوثق منه"], ["الخلو من العلة القادحة", "ألا يكون في الحديث سبب خفي قادح في صحته"]]}]}, {"t": "الشرط الأول: اتصال السند", "b": ["اتصال السند: أن يروي كل راوٍ عمّن فوقه مباشرة، بأن يكون قد سمع منه أو أمكن لقاؤه، لا أن ينقل عنه بواسطة دون أن يذكرها.", "فإن انقطع السند في أي موضع -بأن روى راوٍ عمّن لم يلقه أو لم يعاصره- سُمي ذلك انقطاعًا في السند، ويُحكم على الحديث حينئذ بالضعف؛ لفقدانه شرطًا من شروط الصحة.", "وقد اشترط جمهور العلماء لثبوت اللقاء إمكان اللقاء، أي أن يكون الراويان في عصر واحد ويُحتمل لقاؤهما، بينما اشترط الإمام البخاري أشد من ذلك: ثبوت اللقاء الفعلي بينهما."]}, {"t": "الشرط الثاني: العدالة", "b": ["العدالة: أن يكون الراوي مسلمًا مكلفًا، لا يفعل الكبائر، ولا يصر على الصغائر، ولا يفعل ما يخل بالمروءة.", "وسبب هذا الشرط أن الراوي إذا لم يكن أمينًا في دينه، لم يُؤمن أن يكذب أو يزيد أو ينقص في الحديث، وقد قال الله تعالى: «إن جاءكم فاسق بنبأ فتبينوا»، فإذا لم تثبت عدالة الراوي رُد خبره ولم يُقبل حتى تثبت أمانته.", "وخوارم المروءة هي الأمور التي تُسقط هيبة صاحبها أمام الناس وإن لم تكن حرامًا في ذاتها، وهي تختلف باختلاف الزمان والمكان والعرف، فما كان من خوارم المروءة قديمًا قد لا يكون كذلك اليوم، والعكس صحيح."], "viz": [{"after": 1, "kind": "mindmap", "title": "بنود العدالة الثلاثة", "root": "العدالة", "branches": [{"label": "لا يفعل الكبائر"}, {"label": "لا يصر على الصغائر"}, {"label": "لا يفعل خوارم المروءة"}]}]}, {"t": "الشرط الثالث: الضبط، وتعريف الحديث الحسن", "b": ["الضبط: أن يكون الراوي قوي الحفظ، بحيث تصل الرواية كما سمعها دون خطأ أو تخليط، والضبط نوعان: ضبط صدر (حفظ في القلب) وضبط كتاب (حفظ بالكتابة والتقييد).", "من علامات ضعف ضبط الصدر أن يُصاب الراوي بالاختلاط في آخر عمره، فيُنظر: هل روى عنه الرواة قبل الاختلاط فيُقبل حديثه، أم بعده فيُرد، أم لا يُعرف تاريخ الرواية فيُتوقف فيه.", "ومن أمثلة اختلال ضبط الكتاب احتراق كتب الراوي، كما حدث لعبد الله بن لهيعة رحمه الله، فيُنظر أيضًا: هل الرواية عنه قبل احتراق كتبه أم بعدها.", "وبناء على درجة الضبط تُقسم الرواة إلى ثلاث درجات: تام الضبط، وخفيف الضبط، وسيء الضبط، ولكل درجة أثرها في الحكم على الحديث."], "viz": [{"after": 1, "kind": "mindmap", "title": "نوعا الضبط", "root": "الضبط", "branches": [{"label": "ضبط الصدر", "children": ["حفظ في القلب", "يتأثر بالاختلاط عند الكبر"]}, {"label": "ضبط الكتاب", "children": ["تقييد بالكتابة", "يتأثر بضياع الكتب أو احتراقها"]}]}, {"after": 3, "kind": "table", "title": "حكم الرواية بعد الاختلاط أو احتراق الكتب", "headers": ["زمن الرواية", "الحكم"], "rows": [["قبل الاختلاط / قبل احتراق الكتب", "صحيح"], ["بعد الاختلاط / بعد احتراق الكتب", "ضعيف"], ["غير معروف زمن الرواية", "يُتوقف فيه بحسب القرائن"]]}, {"after": 4, "kind": "table", "title": "أثر درجة الضبط على الحكم على الحديث", "headers": ["درجة الضبط", "الحكم على الحديث"], "rows": [["تام الضبط", "صحيح (إذا توفرت باقي الشروط)"], ["خفيف الضبط", "حسن"], ["سيء الضبط", "ضعيف؛ لفقدانه شرط الضبط"]]}]}, {"t": "الشرط الرابع: عن مثله إلى منتهاه", "b": ["لا يكفي أن يكون بعض رجال السند عدولًا ضابطين وبعضهم لا؛ بل لا بد أن يتحقق وصف العدالة والضبط في كل راوٍ من رواة السند من أوله إلى منتهاه، فالسلسلة تُشبه سلسلة من الحديد، إن كانت كل حلقاتها من الحديد فهي قوية، وإن كانت إحدى حلقاتها من مادة ضعيفة فسدت السلسلة كلها.", "ويُستثنى من هذا البحث الصحابة رضي الله عنهم، فكلهم عدول بإجماع أهل السنة، فلا يُبحث في عدالة أي صحابي، وإنما يبدأ البحث في عدالة وضبط الرواة ممن دون الصحابي."], "viz": [{"after": 0, "kind": "tip", "text": "مثال سلسلة الحديد وسيلة سهلة لتثبيت الفكرة: راوٍ واحد ضعيف في السند يكفي لإضعاف الحديث كله، مهما كان باقي الرواة ثقات."}]}, {"t": "الشرط الخامس: الخلو من الشذوذ", "b": ["الشذوذ: أن يخالف الراوي الثقة من هو أوثق منه، بحيث يروي الحديث على وجه يخالف ما رواه الثقات الآخرون، مع أنه بذاته ثقة.", "ومن أمثلته: حديث «إذا انتصف شعبان فلا تصوموا» الذي ظاهره يعارض ثبوت صيام النبي صلى الله عليه وسلم شعبان كله، وقد وجّه العلماء هذا التعارض الظاهر بأن النهي خاص بمن يخشى الضعف عن صيام رمضان، لا بمن قويت صحته.", "ومن أمثلته أيضًا رواية «إن لله فضلًا في النار فيخلق له خلقًا فيدخلهم النار» في مقابل الرواية الثابتة «إن لله فضلًا في الجنة فيخلق له خلقًا فيدخلهم الجنة»، فحُكم على الرواية الأولى بالشذوذ لمخالفتها الروايات الأخرى الثابتة ولمخالفتها ما هو معلوم من عدل الله سبحانه وتعالى.", "والأصل في الأدلة أنها لا تتعارض حقيقة، وإنما قد يظهر بينها تعارض ظاهري، فالواجب البحث عن وجه الجمع بينها بطرق معروفة كالخاص والعام، والمطلق والمقيد، والناسخ والمنسوخ، ولا يُحكم بالشذوذ إلا بعد استيفاء محاولة الجمع وعدم إمكانه."], "viz": [{"after": 3, "kind": "table", "title": "أمثلة على الشذوذ في المتن", "headers": ["الحديث", "وجه الإشكال", "الحكم"], "rows": [["«إذا انتصف شعبان فلا تصوموا»", "ظاهره يعارض صيام النبي ﷺ شعبان كله", "وُجّه الجمع بينهما، فلم يُحكم عليه بالشذوذ"], ["«فضل في النار» مقابل «فضل في الجنة»", "مخالفة للثابت في الروايات الأخرى ولعدل الله تعالى", "حُكم عليه بالشذوذ"]]}]}, {"t": "الشرط السادس: الخلو من العلة القادحة", "b": ["العلة: وصف خفي قادح يطرأ على الحديث فيُخرجه من الصحة، ويحتاج اكتشافها إلى دقة خاصة لا يدركها إلا المتخصصون في هذا العلم، فقد يبدو الحديث مستوفيًا لكل الشروط الظاهرة، ثم يتبين فيه عيب خفي.", "وليست كل علة قادحة؛ فقد تكون في الحديث علة لكنها غير مؤثرة في صحته، كما في حديث سيدنا جابر رضي الله عنه في قصة بيع الجمل، حيث اضطرب الرواة في تحديد الثمن الذي أعطاه النبي صلى الله عليه وسلم، وهذا اضطراب لا يؤثر في أصل الحديث وأحكامه، فهي علة غير قادحة."], "viz": [{"after": 0, "kind": "tip", "text": "اكتشاف العلل من أدق علوم الحديث ولا يتقنه إلا المتخصصون؛ فلا يُحكم بالعلة على حديث إلا بعد دراسة متأنية، والعلة نفسها قد تكون قادحة أو غير قادحة."}]}, {"t": "أقسام الحديث المقبول", "b": ["يُقسم الحديث من حيث القبول والرد إلى قسمين: مقبول ومردود. فالمقبول هو ما يُعمل به ويكون مصدرًا من مصادر التشريع، والمردود هو الضعيف بأقسامه الكثيرة.", "والحديث المقبول أربعة أنواع: الصحيح لذاته، والصحيح لغيره، والحسن لذاته، والحسن لغيره، وأقواها الصحيح لذاته ثم الصحيح لغيره ثم الحسن لذاته ثم الحسن لغيره.", "فالحسن لغيره: هو الحديث الضعيف إذا تعددت طرقه وتقوى بعضها ببعض، بشرط ألا يكون ضعفه شديدًا كأن يكون راويه كذابًا أو متروكًا، فإذا اجتمعت عدة روايات ضعيفة ضعفًا يسيرًا على نفس المعنى، ارتقى الحديث إلى درجة الحسن لغيره.", "والصحيح لغيره: هو الحسن لذاته إذا تعددت طرقه، فقويت احتمالية عدم الخطأ فيه، فارتقى من درجة الحسن إلى درجة الصحيح، لكن لا بذاته بل بغيره من الطرق المتابعة له."], "viz": [{"after": 1, "kind": "mindmap", "title": "أقسام الحديث من حيث القبول والرد", "root": "الحديث", "branches": [{"label": "مقبول", "children": ["الصحيح لذاته", "الصحيح لغيره", "الحسن لذاته", "الحسن لغيره"]}, {"label": "مردود (ضعيف بأقسامه)"}]}, {"after": 3, "kind": "tip", "text": "رتّب الأنواع الأربعة دائمًا بهذا الترتيب عند المقارنة: صحيح لذاته > صحيح لغيره > حسن لذاته > حسن لغيره."}]}, {"t": "خلاصة: تعريف الحديث الحسن", "b": ["من التعريفات الجامعة للحديث الحسن: هو الحديث المعروف طرقًا، وغدت رجاله لا كالصحيح اشتهرت، أي أن رجاله مشهورون بالرواية وطرقه معروفة، لكن ضبطهم دون ضبط رجال الصحيح.", "وما قصر عن رتبة الحسن من الأحاديث فهو الضعيف بأقسامه الكثيرة، ويأتي تفصيل أقسام الضعيف في الدروس القادمة إن شاء الله."]}]}, "overview": {"title": "خريطة الدرس الكاملة", "root": "مصطلح الحديث", "branches": [{"label": "السند والمتن", "children": ["السند: سلسلة الرواة إلى المتن", "المتن: ما انتهى إليه السند"]}, {"label": "شروط الحديث الصحيح", "children": ["اتصال السند", "العدالة", "الضبط", "عن مثله إلى منتهاه", "الخلو من الشذوذ", "الخلو من العلة القادحة"]}, {"label": "الحديث المقبول", "children": ["صحيح لذاته", "صحيح لغيره", "حسن لذاته", "حسن لغيره"]}, {"label": "الحديث المردود", "children": ["ضعيف بأقسامه الكثيرة"]}]}, "quiz": [{"q": "ما الفرق الدقيق بين تعريف الحديث الصحيح لذاته والحسن لذاته؟", "options": ["الفرق في درجة الضبط فقط: تام الضبط في الصحيح، وخفيف الضبط في الحسن، مع بقية الشروط متحققة في الحالتين", "الفرق في اتصال السند: الصحيح متصل والحسن منقطع", "الحسن لا يُشترط فيه العدالة أصلًا", "لا فرق بينهما، والتسميتان مترادفتان"], "correct": 0, "explanation": "الصحيح والحسن يشتركان في اتصال السند والعدالة وا               }}
            >
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                <p style={{ margin: 0, fontWeight: 700, fontSize: 13, color: T.text, textAlign: "center", fontFamily: HEADING_FONT }}>{b.label}</p>
                {hasKids && (
                  <span style={{
                    flexShrink: 0, width: 15, height: 15, borderRadius: "50%", border: `1px solid ${T.accents[ck]}`,
                    color: T.accents[ck], fontSize: 11, lineHeight: "13px", textAlign: "center", fontWeight: 700,
                  }}>{isOpen ? "−" : "+"}</span>
                )}
              </div>
              {hasKids && isOpen && (
                <ul style={{ margin: "6px 0 0", paddingInlineStart: 16, fontSize: 12, color: T.textSoft, lineHeight: 1.8 }}>
                  {b.children.map((c, j) => <li key={j}>{c}</li>)}
                </ul>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TipBox({ T, ck, text }) {
  return (
    <div style={{
      marginRight: 33, marginBottom: 4, marginTop: 4, borderRadius: T.radius,
      padding: "12px 14px", background: T.accentSoft[ck],
      borderRight: `3px solid ${T.accents[ck]}`,
      display: "flex", gap: 10, alignItems: "flex-start",
    }}>
      <span style={{ fontSize: 15, flexShrink: 0 }}>💡</span>
      <p style={{ margin: 0, fontSize: 13, lineHeight: 1.9, color: T.text, fontFamily: BODY_FONT, fontWeight: 500 }}>
        <span style={{ fontWeight: 700, color: T.accents[ck] }}>ملحوظة: </span>{text}
      </p>
    </div>
  );
}

function VizBlock({ T, ck, v }) {
  if (v.kind === "table") return <InlineTable T={T} ck={ck} title={v.title} headers={v.headers} rows={v.rows} />;
  if (v.kind === "tip") return <TipBox T={T} ck={ck} text={v.text} />;
  return <InlineMindMap T={T} ck={ck} title={v.title} root={v.root} branches={v.branches} />;
}

function NumberedParas({ T, ck, item, size = "normal" }) {
  const isCard = size === "card";
  const paras = item.b;
  const viz = item.viz || [];
  const hide = item.hideParas || [];
  let shown = 0;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: isCard ? 14 : 12, width: "100%" }}>
      {viz.filter((v) => v.after === -1).map((v, vi) => <VizBlock key={"pre" + vi} T={T} ck={ck} v={v} />)}
      {paras.map((para, i) => {
        const isHidden = hide.includes(i);
        if (!isHidden) shown += 1;
        const vizHere = viz.filter((v) => v.after === i);
        return (
          <React.Fragment key={i}>
            {!isHidden && (
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{
                  flexShrink: 0, width: 23, height: 23, borderRadius: "50%",
                  background: T.accentSoft[ck], color: T.accents[ck],
                  fontSize: 11.5, fontWeight: 700, fontFamily: BODY_FONT,
                  display: "flex", alignItems: "center", justifyContent: "center", marginTop: 2,
                }}>{toArabicDigits(shown)}</span>
                <p style={{
                  margin: 0, flex: 1, textAlign: "justify",
                  fontSize: isCard ? 14.5 : 14, lineHeight: 2,
                  color: isCard ? T.text : T.textSoft, fontFamily: BODY_FONT,
                }}>{para}</p>
              </div>
            )}
            {vizHere.map((v, vi) => <VizBlock key={vi} T={T} ck={ck} v={v} />)}
          </React.Fragment>
        );
      })}
    </div>
  );
}

const ITEMS = RAW.hadith.items;
const CHAPTER_TITLE = RAW.hadith.name;

function useProgress() {
  const KEY = "hadith-mustalah-progress-v1";
  const [known, setKnown] = useState(() => {
    try {
      const raw = localStorage.getItem(KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  });
  useEffect(() => {
    try { localStorage.setItem(KEY, JSON.stringify(known)); } catch (e) {}
  }, [known]);
  const toggleKnown = (idx) => setKnown((k) => ({ ...k, [idx]: !k[idx] }));
  return { known, toggleKnown };
}

function TopBar({ T, mode, setMode, themeName, setThemeName }) {
  const modes = [
    { id: "browse", label: "تصفح" },
    { id: "cards", label: "بطاقات" },
    { id: "overview", label: "خريطة الدرس" },
    { id: "quiz", label: "اختبار" },
  ];
  return (
    <div style={{
      position: "sticky", top: 0, zIndex: 20, background: T.bg,
      paddingTop: 14, paddingBottom: 10, borderBottom: `1px solid ${T.border}`,
      display: "flex", flexDirection: "column", gap: 10,
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
        <h1 style={{
          margin: 0, fontSize: 19, fontWeight: 700, color: T.text, fontFamily: HEADING_FONT,
        }}>{CHAPTER_TITLE}</h1>
        <div style={{ display: "flex", gap: 6 }}>
          {Object.keys(THEMES).map((name) => (
            <button key={name} onClick={() => setThemeName(name)} style={{
              width: 24, height: 24, borderRadius: "50%",
              border: themeName === name ? `2px solid ${T.accents[CK]}` : `1px solid ${T.border}`,
              background: THEMES[name].bg, padding: 0,
            }} title={name} />
          ))}
        </div>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        {modes.map((m) => (
          <button key={m.id} onClick={() => setMode(m.id)} style={{
            padding: "8px 18px", borderRadius: 999, border: `1px solid ${mode === m.id ? T.accents[CK] : T.border}`,
            background: mode === m.id ? T.accents[CK] : "transparent",
            color: mode === m.id ? "#fff" : T.textSoft,
            fontWeight: 700, fontSize: 13.5, fontFamily: BODY_FONT,
          }}>{m.label}</button>
        ))}
      </div>
    </div>
  );
}

function BrowseView({ T, openIdx, setOpenIdx, known, toggleKnown }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 16 }}>
      {ITEMS.map((item, idx) => {
        const isOpen = openIdx === idx;
        return (
          <div key={idx} style={{
            border: `1px solid ${T.border}`, borderRadius: T.radius, background: T.surface, overflow: "hidden",
          }}>
            <div
              onClick={() => setOpenIdx(isOpen ? -1 : idx)}
              style={{
                display: "flex", alignItems: "center", justifyContent: "space-between",
                padding: "14px 16px", cursor: "pointer", gap: 10,
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{
                  flexShrink: 0, width: 27, height: 27, borderRadius: "50%",
                  background: T.accentSoft[CK], color: T.accents[CK], fontSize: 12.5, fontWeight: 700,
                  display: "flex", alignItems: "center", justifyContent: "center", fontFamily: BODY_FONT,
                }}>{toArabicDigits(idx + 1)}</span>
                <span style={{ fontWeight: 700, fontSize: 15, color: T.text, fontFamily: HEADING_FONT }}>{item.t}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span
                  onClick={(e) => { e.stopPropagation(); toggleKnown(idx); }}
                  style={{
                    fontSize: 11, padding: "4px 10px", borderRadius: 999,
                    border: `1px solid ${known[idx] ? T.accents[CK] : T.border}`,
                    color: known[idx] ? T.accents[CK] : T.textSoft,
                    fontFamily: BODY_FONT, fontWeight: 700,
                  }}
                >{known[idx] ? "✓ محفوظ" : "لم يُراجع"}</span>
                <span style={{ color: T.textSoft, fontSize: 13, transform: isOpen ? "rotate(180deg)" : "none", transition: "transform .15s" }}>⌄</span>
              </div>
            </div>
            {isOpen && (
              <div style={{ padding: "0 16px 18px 16px" }}>
                <NumberedParas T={T} ck={CK} item={item} />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function CardsView({ T, known, toggleKnown }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const item = ITEMS[idx];
  const go = (dir) => {
    setFlipped(false);
    setIdx((i) => (i + dir + ITEMS.length) % ITEMS.length);
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, marginTop: 20 }}>
      <div style={{ color: T.textSoft, fontSize: 13, fontFamily: BODY_FONT }}>
        {toArabicDigits(idx + 1)} / {toArabicDigits(ITEMS.length)}
      </div>
      <div
        onClick={() => setFlipped((f) => !f)}
        style={{
          width: "100%", maxWidth: 640, minHeight: 280, maxHeight: 640, overflowY: "auto",
          border: `1px solid ${T.border}`, borderRadius: T.radius, background: T.surface,
          padding: 26, cursor: "pointer", display: "flex", flexDirection: "column",
          justifyContent: flipped ? "flex-start" : "center",
        }}
      >
        {!flipped ? (
          <div style={{ textAlign: "center" }}>
            <p style={{
              margin: 0, fontSize: 21, fontWeight: 700, color: T.text, fontFamily: HEADING_FONT, lineHeight: 1.7,
            }}>{item.t}</p>
            <p style={{ marginTop: 18, color: T.textSoft, fontSize: 12.5, fontFamily: BODY_FONT }}>اضغط لعرض التفاصيل</p>
          </div>
        ) : (
          <div>
            <p style={{
              margin: "0 0 16px", fontSize: 17, fontWeight: 700, color: T.accents[CK], fontFamily: HEADING_FONT,
            }}>{item.t}</p>
            <NumberedParas T={T} ck={CK} item={item} size="card" />
          </div>
        )}
      </div>
      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
        <button onClick={() => go(1)} style={navBtnStyle(T)}>السابق ›</button>
        <button
          onClick={() => toggleKnown(idx)}
          style={{
            padding: "9px 20px", borderRadius: 999, border: `1px solid ${known[idx] ? T.accents[CK] : T.border}`,
            background: known[idx] ? T.accents[CK] : "transparent",
            color: known[idx] ? "#fff" : T.textSoft, fontWeight: 700, fontSize: 13, fontFamily: BODY_FONT,
          }}
        >{known[idx] ? "✓ محفوظ" : "علّمه كمحفوظ"}</button>
        <button onClick={() => go(-1)} style={navBtnStyle(T)}>‹ التالي</button>
      </div>
    </div>
  );
}

function navBtnStyle(T) {
  return {
    padding: "9px 18px", borderRadius: 999, border: `1px solid ${T.border}`,
    background: "transparent", color: T.text, fontWeight: 700, fontSize: 13, fontFamily: BODY_FONT,
  };
}

function OverviewView({ T }) {
  const OV = RAW.overview;
  return (
    <div style={{ marginTop: 20 }}>
      <InlineMindMap T={T} ck={CK} title={OV.title} root={OV.root} branches={OV.branches} />
    </div>
  );
}

function findItemIndexByTitle(title) {
  return ITEMS.findIndex((it) => it.t === title);
}

function QuizView({ T, goToSource }) {
  const QUESTIONS = RAW.quiz;
  const [order] = useState(() => QUESTIONS.map((_, i) => i));
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);

  const qIdx = order[idx];
  const q = QUESTIONS[qIdx];

  const choose = (optIdx) => {
    if (selected !== null) return;
    setSelected(optIdx);
    if (optIdx === q.correct) setScore((s) => s + 1);
  };

  const next = () => {
    if (idx + 1 >= order.length) { setFinished(true); return; }
    setIdx((i) => i + 1);
    setSelected(null);
  };

  const restart = () => {
    setIdx(0); setSelected(null); setScore(0); setFinished(false);
  };

  if (finished) {
    return (
      <div style={{ marginTop: 30, textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>
        <p style={{ fontSize: 18, fontWeight: 700, color: T.text, fontFamily: HEADING_FONT }}>نتيجتك</p>
        <p style={{ fontSize: 34, fontWeight: 700, color: T.accents[CK], fontFamily: HEADING_FONT }}>
          {toArabicDigits(score)} / {toArabicDigits(QUESTIONS.length)}
        </p>
        <button onClick={restart} style={{
          padding: "10px 26px", borderRadius: 999, border: `1px solid ${T.accents[CK]}`,
          background: T.accents[CK], color: "#fff", fontWeight: 700, fontSize: 13.5, fontFamily: BODY_FONT,
        }}>أعد الاختبار</button>
      </div>
    );
  }

  return (
    <div style={{ marginTop: 20, display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
      <div style={{ color: T.textSoft, fontSize: 13, fontFamily: BODY_FONT }}>
        سؤال {toArabicDigits(idx + 1)} من {toArabicDigits(order.length)} — النتيجة الحالية: {toArabicDigits(score)}
      </div>
      <div style={{
        width: "100%", maxWidth: 660, border: `1px solid ${T.border}`, borderRadius: T.radius,
        background: T.surface, padding: 22,
      }}>
        <p style={{ margin: "0 0 18px", fontSize: 16, fontWeight: 700, color: T.text, fontFamily: HEADING_FONT, lineHeight: 1.9 }}>
          {q.q}
        </p>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {q.options.map((opt, oi) => {
            const isSelected = selected === oi;
            const isCorrectOpt = oi === q.correct;
            let border = T.border, bg = "transparent", color = T.text;
            if (selected !== null) {
              if (isCorrectOpt) { border = T.accents[CK]; bg = T.accentSoft[CK]; color = T.accents[CK]; }
              else if (isSelected) { border = "#c0504d"; bg = "rgba(192,80,77,0.12)"; color = "#c0504d"; }
            }
            return (
              <div key={oi} onClick={() => choose(oi)} style={{
                border: `1px solid ${border}`, borderRadius: 10, padding: "10px 14px",
                background: bg, color, cursor: selected === null ? "pointer" : "default",
                fontSize: 13.5, fontFamily: BODY_FONT, lineHeight: 1.8, fontWeight: isSelected || (selected !== null && isCorrectOpt) ? 700 : 400,
              }}>{opt}</div>
            );
          })}
        </div>

        {selected !== null && (
          <div style={{ marginTop: 16 }}>
            <div style={{
              borderRadius: T.radius, padding: "12px 14px", background: T.accentSoft[CK],
              borderRight: `3px solid ${T.accents[CK]}`, marginBottom: 14,
            }}>
              <p style={{ margin: 0, fontSize: 13, lineHeight: 1.9, color: T.text, fontFamily: BODY_FONT }}>
                <span style={{ fontWeight: 700, color: T.accents[CK] }}>
                  {selected === q.correct ? "إجابة صحيحة — " : "إجابة غير دقيقة — "}
                </span>
                {q.explanation}
              </p>
              <p
                onClick={() => goToSource(q.source)}
                style={{
                  margin: "10px 0 0", fontSize: 12, color: T.accents[CK], fontFamily: BODY_FONT,
                  fontWeight: 700, cursor: "pointer", textDecoration: "underline",
                }}
              >↩ موضعها في الملف: {q.source}</p>
            </div>
            <div style={{ textAlign: "left" }}>
              <button onClick={next} style={{
                padding: "9px 22px", borderRadius: 999, border: `1px solid ${T.accents[CK]}`,
                background: T.accents[CK], color: "#fff", fontWeight: 700, fontSize: 13, fontFamily: BODY_FONT,
              }}>{idx + 1 >= order.length ? "عرض النتيجة" : "السؤال التالي ‹"}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [themeName, setThemeName] = useState("ليلي");
  const [mode, setMode] = useState("browse");
  const [openIdx, setOpenIdx] = useState(0);
  const { known, toggleKnown } = useProgress();
  const T = THEMES[themeName];

  const goToSource = (title) => {
    const i = findItemIndexByTitle(title);
    if (i >= 0) {
      setOpenIdx(i);
      setMode("browse");
    }
  };

  return (
    <div dir="rtl" style={{
      minHeight: "100vh", background: T.bg, color: T.text, fontFamily: BODY_FONT,
    }}>
      <div style={{ maxWidth: 1040, margin: "0 auto", padding: "0 20px 60px" }}>
        <TopBar T={T} mode={mode} setMode={setMode} themeName={themeName} setThemeName={setThemeName} />
        {mode === "browse" && <BrowseView T={T} openIdx={openIdx} setOpenIdx={setOpenIdx} known={known} toggleKnown={toggleKnown} />}
        {mode === "cards" && <CardsView T={T} known={known} toggleKnown={toggleKnown} />}
        {mode === "overview" && <OverviewView T={T} />}
        {mode === "quiz" && <QuizView T={T} goToSource={goToSource} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
