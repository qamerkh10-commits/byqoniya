<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="green">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنظومة البيقونية</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div>جاري التحميل...</div>
</div>

<div class="app-shell" id="appShell" style="display:none;">

  <aside class="sidebar" id="sidebar">
    <div class="brand-block">
      <h1 class="brand">المنظومة البيقونية</h1>
      <div class="brand-sub">في مصطلح الحديث</div>
    </div>

    <ul class="nav-list" id="navList">
      <li>
        <button class="nav-item" id="homeNavBtn">
          <span class="icon">🏠</span><span>الرئيسية</span>
        </button>
      </li>
      <li>
        <a class="nav-item" href="/tracker.html">
          <span class="icon">📅</span><span>جدول محفوظاتي</span>
        </a>
      </li>
      <li class="nav-section-label">الأقسام</li>
      <!-- تُملأ ديناميكيًا -->
    </ul>

    <div class="sidebar-footer">
      <div class="user-chip">
        <span class="avatar sm" id="userAvatar">؟</span>
        <span class="u-name" id="usernameLabel">—</span>
        <span class="role-badge" id="roleBadge">مستخدم</span>
      </div>
      <button class="btn secondary google-link-btn" id="googleLinkBtn" style="display:none;">🔗 ربط حساب Google</button>
      <a href="/admin.html" class="btn secondary" id="adminLink" style="display:none; margin-bottom:8px;">لوحة تحكم المطور</a>
      <button class="btn danger" id="logoutBtn">تسجيل الخروج</button>
    </div>
  </aside>

  <div class="main-area">
    <div class="mobile-topbar">
      <button id="menuToggle">☰</button>
      <strong class="brand" id="mobileTitle">المنظومة البيقونية</strong>
      <span></span>
    </div>

    <div class="topbar">
      <div class="page-title" id="pageTitle">الرئيسية</div>
      <div class="actions">
        <div class="theme-sw" id="theme-sw">
          <div class="tsw green" data-theme="green" title="أخضر"></div>
          <div class="tsw navy" data-theme="navy" title="كحلي"></div>
          <div class="tsw brown" data-theme="brown" title="بني"></div>
        </div>
      </div>
    </div>

    <div class="content-frame-wrap" id="frameWrap">
      <!-- يُملأ ديناميكيًا: إما لوحة الكروت، أو إطار صفحة محتوى -->
    </div>
  </div>

</div>

<script src="/js/app.js"></script>
</body>
</html>
