<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="green">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — المنظومة البيقونية</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1 class="brand">المنظومة البيقونية</h1>
      <div class="subtitle">سجّل دخولك للمتابعة</div>

      <div class="error-box" id="errorBox"></div>

      <div id="googleBtnWrap" style="display:none; margin-bottom:6px;">
        <div id="googleBtn"></div>
        <div class="divider">أو</div>
      </div>

      <form id="loginForm">
        <div class="field">
          <label>البريد الإلكتروني</label>
          <input type="email" id="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button class="btn block" type="submit" id="submitBtn">تسجيل الدخول</button>
      </form>

      <div class="switch-link">
        مش عندك حساب؟ <a href="/register.html">إنشاء حساب جديد</a>
      </div>
    </div>
  </div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const form = document.getElementById('loginForm');
const errorBox = document.getElementById('errorBox');
const submitBtn = document.getElementById('submitBtn');

// ثيم محفوظ
document.documentElement.setAttribute('data-theme', localStorage.getItem('baiq-theme') || 'green');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الدخول...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'تعذر تسجيل الدخول');
    window.location.href = '/index.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'تسجيل الدخول';
  }
});

// تفعيل زرار جوجل لو السيرفر مفعّله
(async function initGoogle() {
  try {
    const res = await fetch('/api/auth/config');
    const cfg = await res.json();
    if (!cfg.googleEnabled) return;

    function renderBtn() {
      if (!window.google || !window.google.accounts) return setTimeout(renderBtn, 200);
      google.accounts.id.initialize({
        client_id: cfg.googleClientId,
        callback: async (response) => {
          errorBox.style.display = 'none';
          try {
            const r = await fetch('/api/auth/google', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ credential: response.credential }),
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || 'تعذر تسجيل الدخول بجوجل');
            window.location.href = '/index.html';
          } catch (err) {
            errorBox.textContent = err.message;
            errorBox.style.display = 'block';
          }
        },
      });
      google.accounts.id.renderButton(document.getElementById('googleBtn'), {
        theme: 'outline', size: 'large', width: 360, locale: 'ar',
      });
      document.getElementById('googleBtnWrap').style.display = 'block';
    }
    renderBtn();
  } catch (e) { /* لو فشل التحقق نسيب الفورم العادي شغال */ }
})();
</script>
</body>
</html>
